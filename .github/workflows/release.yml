name: Release builds

# Multi-platform plugin builds for Windows, Linux, and macOS.
# Primary release path while GitLab CI compute is unavailable.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create/update a GitHub release from this run (tag pushes always release)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows Qt${{ matrix.qt_major }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_major: '5'
            qt_version: '5.15.2'
            qt_arch: win64_msvc2019_64
            variant: Windows_64
          - qt_major: '6'
            qt_version: '6.8.3'
            qt_arch: win64_msvc2022_64
            variant: Windows_64_Qt6
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          cache: true
          modules: ''

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        shell: cmd
        run: |
          qmake -v
          qmake OpenRGB3DSpatialPlugin.pro CONFIG+=release
          nmake

      - name: Package
        shell: pwsh
        env:
          QT_MAJOR: ${{ matrix.qt_major }}
          DIST_VARIANT: ${{ matrix.variant }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/package-windows.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}
          path: |
            dist/*.zip
            release/OpenRGB3DSpatialPlugin.dll
          if-no-files-found: error

  build-linux:
    name: Linux Qt${{ matrix.qt_major }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        qt_major: ['5', '6']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          chmod +x scripts/ci/*.sh
          sudo bash scripts/ci/install-linux-deps.sh ${{ matrix.qt_major }}

      - name: Build
        run: bash scripts/ci/build-linux.sh ${{ matrix.qt_major }} release

      - name: Package
        run: bash scripts/ci/package-linux.sh ${{ matrix.qt_major }} amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux_amd64${{ matrix.qt_major == '6' && '_Qt6' || '' }}
          path: |
            dist/*
            libOpenRGB3DSpatialPlugin.so
          if-no-files-found: error

  build-macos:
    name: macOS Qt${{ matrix.qt_major }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        qt_major: ['5', '6']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build
        run: |
          chmod +x scripts/ci/*.sh
          bash scripts/ci/build-macos.sh ${{ matrix.qt_major }} release

      - name: Package
        env:
          DIST_VARIANT: macOS_arm64${{ matrix.qt_major == '6' && '_Qt6' || '' }}
        run: bash scripts/ci/package-macos.sh ${{ matrix.qt_major }} arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS_arm64${{ matrix.qt_major == '6' && '_Qt6' || '' }}
          path: |
            dist/*.zip
            libOpenRGB3DSpatialPlugin.dylib
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [build-windows, build-linux, build-macos]
    if: >-
      always() &&
      !cancelled() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.create_release))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        id: assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.zip' -o -name '*.deb' -o -name '*.tar.gz' \) -print0 \
            | while IFS= read -r -d '' f; do
                cp -v "$f" "release-assets/$(basename "$f")"
              done
          echo "files=$(find release-assets -type f | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
          ls -la release-assets

      - name: Fail if no packages
        if: steps.assets.outputs.files == '0'
        run: |
          echo "No packaged artifacts found — at least one OS build must succeed."
          exit 1

      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=v0.0.0-ci-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"
          NOTES="$(cat <<EOF
          ## OpenRGB 3D Spatial Plugin ${TAG}

          Pre-built plugins for **Windows**, **Linux**, and **macOS** (Qt5 and Qt6 where available).

          ### Install
          - **Windows:** unzip and copy the \`.dll\` into OpenRGB's \`plugins\` folder.
          - **Linux:** install the \`.deb\`, or extract the \`.tar.gz\` into \`/usr/lib/openrgb/plugins/\`.
          - **macOS:** unzip and copy the \`.dylib\` into \`OpenRGB.app/Contents/MacOS/plugins/\`.

          Match Qt5 vs Qt6 (\`-qt6\` / \`_Qt6\`) to your OpenRGB build.
          EOF
          )"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* \
              --title "$TAG" \
              --notes "$NOTES"
          fi
