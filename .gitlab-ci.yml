#-----------------------------------------------------------#
# OpenRGB 3D Spatial Plugin — GitLab CI                       #
#-----------------------------------------------------------#

.downstream_rules:
  rules:
    - if: $CI_PROJECT_PATH !~ /^(OpenRGBDevelopers|wolfieeewolf1)\/OpenRGB3DSpatialPlugin$/ && $CI_PIPELINE_SOURCE == "push"
      when: manual
      allow_failure: true

.upstream_rules:
  rules:
    - if: '$CI_PROJECT_PATH =~ /^(OpenRGBDevelopers|wolfieeewolf1)\/OpenRGB3DSpatialPlugin$/ && ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_TAG)'
      when: on_success
    - !reference [.downstream_rules, rules]

# OpenRGB org private runners (OpenRGBDevelopers project only)
.org_linux_runners:
  tags: [linux, amd64]

.org_windows_runners:
  tags: [shared-windows, windows, windows-1809]

# GitLab.com shared SaaS runners (personal fork)
.saas_linux_runners:
  tags: [saas-linux-small-amd64]

.saas_windows_runners:
  tags: [saas-windows-medium-amd64]

stages:
  - sync
  - build
  - deploy

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_DEPTH: 0

before_script:
  - echo "started by ${GITLAB_USER_NAME}"

#-----------------------------------------------------------------------------
# Linux — SaaS (ubuntu + apt) for personal fork
#-----------------------------------------------------------------------------
.hidden_linux_saas:
  stage: build
  image: ubuntu:22.04
  tags: [saas-linux-small-amd64]
  script:
    - chmod +x scripts/ci/*.sh
    - bash scripts/ci/install-linux-deps.sh ${QT_MAJOR}
    - bash scripts/ci/build-linux.sh ${QT_MAJOR} release
    - bash scripts/ci/package-linux.sh ${QT_MAJOR} amd64
  artifacts:
    name: "${CI_PROJECT_NAME}_${DIST_VARIANT}_${CI_COMMIT_SHORT_SHA}"
    paths: [dist/, libOpenRGB3DSpatialPlugin.so]
    expire_in: 30 days
  rules:
    - !reference [.upstream_rules, rules]

"Linux amd64":
  extends: .hidden_linux_saas
  variables:
    QT_MAJOR: "5"
    DIST_VARIANT: Linux_amd64

"Linux amd64 Qt6":
  extends: .hidden_linux_saas
  variables:
    QT_MAJOR: "6"
    DIST_VARIANT: Linux_amd64_Qt6

# OpenRGB org: bookworm image on private linux runners (optional extra arch jobs)
.ccache_init: &ccache_init
  before_script:
    - export APPIMAGE_EXTRACT_AND_RUN=1
    - echo "started by ${GITLAB_USER_NAME}"

.hidden_linux_org:
  <<: *ccache_init
  stage: build
  image: registry.gitlab.com/openrgbdevelopers/openrgb-linux-ci-deb-builder:bookworm-amd64
  tags: [linux, amd64]
  script:
    - export $(dpkg-architecture)
    - chmod +x scripts/ci/*.sh scripts/build-plugin.sh
    - ./scripts/build-plugin.sh ${TGT_QT}
    - bash scripts/ci/package-linux.sh ${QT_MAJOR} amd64
  artifacts:
    name: "${CI_PROJECT_NAME}_${DIST_VARIANT}_${CI_COMMIT_SHORT_SHA}"
    paths: [dist/, libOpenRGB3DSpatialPlugin.so]
    expire_in: 30 days
  rules:
    - if: '$CI_PROJECT_PATH == "OpenRGBDevelopers/OpenRGB3DSpatialPlugin" && ($CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_TAG)'

"Linux amd64 (org runners)":
  extends: .hidden_linux_org
  variables:
    TGT_QT: ""
    QT_MAJOR: "5"
    DIST_VARIANT: Linux_amd64_org

"Linux amd64 Qt6 (org runners)":
  extends: .hidden_linux_org
  variables:
    TGT_QT: qt6
    QT_MAJOR: "6"
    DIST_VARIANT: Linux_amd64_Qt6_org

#-----------------------------------------------------------------------------
# Windows 64 — GitLab SaaS
#-----------------------------------------------------------------------------
.hidden_windows_saas:
  stage: build
  tags: [saas-windows-medium-amd64]
  cache:
    key: "${CI_JOB_NAME}-deps"
    paths:
      - C:/Qt/
      - C:/Program Files/Microsoft Visual Studio/
      - C:/Program Files (x86)/Microsoft Visual Studio/
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/gitlab-windows-build.ps1
  artifacts:
    name: "${CI_PROJECT_NAME}_${DIST_VARIANT}_${CI_COMMIT_SHORT_SHA}"
    paths: [dist/, release/OpenRGB3DSpatialPlugin.dll]
    expire_in: 30 days
  rules:
    - !reference [.upstream_rules, rules]

"Windows 64":
  extends: .hidden_windows_saas
  variables:
    QT_MAJOR: "5"
    QT_AQT_VERSION: "5.15.2"
    QT_AQT_ARCH: "win64_msvc2019_64"
    QT_BIN_DIR: "C:\\Qt\\5.15.2\\msvc2019_64\\bin"
    QT_MSVC_BOOTSTRAP_PACKAGE: "visualstudio2019buildtools"
    DIST_VARIANT: "Windows_64"

"Windows 64 Qt6":
  extends: .hidden_windows_saas
  variables:
    QT_MAJOR: "6"
    QT_AQT_VERSION: "6.10.3"
    QT_AQT_ARCH: "win64_msvc2022_64"
    QT_BIN_DIR: "C:\\Qt\\6.10.3\\msvc2022_64\\bin"
    QT_MSVC_BOOTSTRAP_PACKAGE: "visualstudio2022buildtools"
    DIST_VARIANT: "Windows_64_Qt6"

#-----------------------------------------------------------------------------
# GitHub mirror (sync stage — does not wait for builds)
#-----------------------------------------------------------------------------
mirror-to-github:
  stage: sync
  image: alpine:3.21
  before_script:
    - apk add --no-cache git bash
  script:
    - chmod +x scripts/ci/mirror-to-github.sh
    - bash scripts/ci/mirror-to-github.sh
  rules:
    - if: '$CI_PROJECT_PATH =~ /^(OpenRGBDevelopers|wolfieeewolf1)\/OpenRGB3DSpatialPlugin$/ && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PROJECT_PATH =~ /^(OpenRGBDevelopers|wolfieeewolf1)\/OpenRGB3DSpatialPlugin$/ && $CI_COMMIT_TAG'

#-----------------------------------------------------------------------------
# Tag release
#-----------------------------------------------------------------------------
release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: "Windows 64"
      artifacts: true
      optional: true
    - job: "Windows 64 Qt6"
      artifacts: true
      optional: true
    - job: "Linux amd64"
      artifacts: true
      optional: true
    - job: "Linux amd64 Qt6"
      artifacts: true
      optional: true
  script:
    - echo "Publishing GitLab release $CI_COMMIT_TAG"
    - find dist -type f 2>/dev/null | sort || true
    - |
      release-cli create \
        --name "${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "OpenRGB 3D Spatial Plugin ${CI_COMMIT_TAG}. Windows: unzip the .dll into OpenRGB plugins. Linux: install the .deb or extract the .tar.gz to /usr/lib/openrgb/plugins/. Match Qt5 vs Qt6 to your OpenRGB build." \
        --assets-path dist/
  rules:
    - if: $CI_COMMIT_TAG
