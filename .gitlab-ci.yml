# GitLab CI — Qt 5 and Qt 6 on Linux (shared Docker runners) and Windows (GitLab SaaS).
#
# Windows jobs use tag "saas-windows-medium-amd64" (GitLab-hosted), not OpenRGB's
# private "shared-windows" runners. Qt is installed per job via aqt (same versions as
# .github/workflows/build.yml). Requires Windows CI minutes on your GitLab plan.
#
# If jobs stay "stuck": Settings → CI/CD → Runners — enable shared/hosted runners and
# allow them on protected branches; confirm Windows runners are available for the project.

stages:
  - build
  - release

variables:
  GIT_DEPTH: 0
  GIT_SUBMODULE_STRATEGY: recursive

#-----------------------------------------------------------------------------
# Windows — GitLab SaaS runner + aqt + MSVC (vswhere, same as GitHub Actions)
#-----------------------------------------------------------------------------
.windows_plugin_build:
  stage: build
  tags:
    - saas-windows-medium-amd64
  before_script:
    - python -m pip install --quiet aqtinstall
    - python -m aqt install-qt windows desktop $env:QT_AQT_VERSION $env:QT_AQT_ARCH -O C:\Qt
    - $env:Path = "$env:QT_BIN_DIR;$env:Path"
    - $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
    - if (-not $vs) { Write-Error "Failed to locate MSVC via vswhere"; exit 1 }
    - cmd /c "`"$vs\VC\Auxiliary\Build\vcvars64.bat`" && set PATH=$env:QT_BIN_DIR;%PATH% && qmake -v"
  script:
    - $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
    - cmd /c "`"$vs\VC\Auxiliary\Build\vcvars64.bat`" && set PATH=$env:QT_BIN_DIR;%PATH% && qmake OpenRGB3DSpatialPlugin.pro CONFIG+=release && nmake"
  artifacts:
    name: "${CI_JOB_NAME}_${CI_COMMIT_SHORT_SHA}"
    paths:
      - release/OpenRGB3DSpatialPlugin.dll
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build-windows-qt5:
  extends: .windows_plugin_build
  variables:
    QT_AQT_VERSION: "5.15.2"
    QT_AQT_ARCH: "win64_msvc2019_64"
    QT_BIN_DIR: "C:\\Qt\\5.15.2\\msvc2019_64\\bin"

build-windows-qt6:
  extends: .windows_plugin_build
  variables:
    QT_AQT_VERSION: "6.10.3"
    QT_AQT_ARCH: "win64_msvc2022_64"
    QT_BIN_DIR: "C:\\Qt\\6.10.3\\msvc2022_64\\bin"

#-----------------------------------------------------------------------------
# Linux — Ubuntu 22.04 (Qt 5 default packages vs Qt 6)
#-----------------------------------------------------------------------------
.linux_plugin_common:
  image: ubuntu:22.04
  stage: build
  artifacts:
    name: "${CI_JOB_NAME}_${CI_COMMIT_SHORT_SHA}"
    paths:
      - libOpenRGB3DSpatialPlugin.so
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build-linux-qt5:
  extends: .linux_plugin_common
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq qtbase5-dev qt5-qmake qtbase5-dev-tools libgl1-mesa-dev libglu1-mesa-dev libusb-1.0-0-dev libhidapi-dev build-essential
  script:
    - qmake OpenRGB3DSpatialPlugin.pro PREFIX=/usr
    - make -j$(nproc)

build-linux-qt6:
  extends: .linux_plugin_common
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq qt6-base-dev qt6-base-dev-tools libgl1-mesa-dev libglu1-mesa-dev libusb-1.0-0-dev libhidapi-dev build-essential
  script:
    - |
      QM="$(command -v qmake6 2>/dev/null || command -v qmake-qt6 2>/dev/null || true)"
      if [ -z "$QM" ] && [ -x /usr/lib/qt6/bin/qmake ]; then
        QM=/usr/lib/qt6/bin/qmake
      fi
      if [ -z "$QM" ]; then
        echo "Qt6 qmake not found"
        exit 1
      fi
      "$QM" -v
      "$QM" OpenRGB3DSpatialPlugin.pro PREFIX=/usr
    - make -j$(nproc)

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-windows-qt5
      artifacts: true
    - job: build-windows-qt6
      artifacts: true
    - job: build-linux-qt5
      artifacts: true
    - job: build-linux-qt6
      artifacts: true
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG (Qt 5 and Qt 6 build artifacts)"
  rules:
    - if: $CI_COMMIT_TAG
